name: Render narrated MP4

on:
  push:
    branches:
      - main
    paths:
      - assets/demo-narration.mp3
      - scripts/render_narrated_mp4.sh
      - .github/workflows/render-narrated-mp4.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Render MP4
        run: bash scripts/render_narrated_mp4.sh
      - name: Commit and push changes
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Render NTPC narrated MP4"

          # Remote may move while the job runs (e.g., force-push/rebased main).
          # Rebase and retry once so push remains fast-forward.
          git pull --rebase origin "$BRANCH_NAME"
          git push origin HEAD:"$BRANCH_NAME"
