name: Generate narration audio

on:
  push:
    branches:
      - main
    paths:
      - assets/narration.txt
      - scripts/generate_narration.py
      - .github/workflows/generate-narration.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip edge-tts
      - name: Generate narration
        run: python scripts/generate_narration.py
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Regenerate NTPC narration audio
