name: Generate narration audio

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y espeak ffmpeg
      - name: Generate narration
        run: python scripts/generate_narration.py
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Regenerate NTPC narration audio
