name: Generate narration audio

on:
  push:
    branches:
      - main
    paths:
      - assets/narration.txt
      - scripts/generate_narration.py
      - .github/workflows/generate-narration.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip edge-tts
      - name: Generate narration
        run: python scripts/generate_narration.py
      - name: Commit and push changes
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Regenerate NTPC narration audio"

          # Remote may move while the job runs (e.g., force-push/rebased main).
          # Rebase and retry once so push remains fast-forward.
          git pull --rebase origin "$BRANCH_NAME"
          git push origin HEAD:"$BRANCH_NAME"
